<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirigiendo...</title>
</head>
<body>
<script>
  // Obtener parámetros
  const params = window.location.search;
  const urlParams = new URLSearchParams(params);
  const code = urlParams.get('code');
  
  // Detectar móvil
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  
  if (isMobile) {
    // MÓVIL: igual que antes
    window.location.href = "viewersfans://viewersfans.app/twitch" + params;
  } else {
    // WEB: Guardar código en sessionStorage y redirigir a URL limpia
    if (code) {
      // Guardar el código en sessionStorage
      sessionStorage.setItem('twitch_code', code);
      // Redirigir a la app SIN el código en la URL
      window.location.href = "https://viewersfans.flutterflow.app/";
    } else {
      window.location.href = "https://viewersfans.flutterflow.app/";
    }
  }
</script>
</body>
</html>
