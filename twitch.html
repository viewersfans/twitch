<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Connecting Twitch...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #9146FF;
      color: white;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .loader {
      border: 4px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top: 4px solid #fff;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Conectando con Twitch...</h2>
    <div class="loader"></div>
    <p>Redirigiendo a la aplicación...</p>
  </div>

<script>
  // Obtener parámetros
  const params = window.location.search;
  const urlParams = new URLSearchParams(params);
  const code = urlParams.get('code');
  
  // Detectar móvil
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  
  setTimeout(() => {
    if (isMobile) {
      // MÓVIL: Usar tu esquema original (el listener lo capturará)
      window.location.href = "viewersfans://viewersfans.app/twitch" + params;
    } else {
      // WEB: Redirigir al home con el código
      if (code) {
        window.location.href = "https://viewersfans.app/?twitch_code=" + code;
      } else {
        window.location.href = "https://viewersfans.app/";
      }
    }
  }, 1500);
</script>
</body>
</html>
