<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirigiendo...</title>
</head>
<body>
<script>
  // Obtener parámetros
  const params = window.location.search;
  const urlParams = new URLSearchParams(params);
  const code = urlParams.get('code');
  
  // Limpiar URL inmediatamente (no mostrar el código)
  if (window.history.replaceState) {
    window.history.replaceState({}, document.title, window.location.pathname);
  }
  
  // Detectar móvil
  const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  
  // Redirigir INMEDIATAMENTE
  if (isMobile) {
    // MÓVIL: Usar esquema original
    window.location.href = "viewersfans://viewersfans.app/twitch" + params;
  } else {
    // WEB: Redirigir al home con el código
    if (code) {
      window.location.href = "https://viewersfans.flutterflow.app/?twitch_code=" + code;
    } else {
      window.location.href = "https://viewersfans.flutterflow.app/";
    }
  }
</script>
</body>
</html>
